<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bezel" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#2a2724"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </radialGradient>
    <radialGradient id="cap" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#4a4540"/>
      <stop offset="100%" stop-color="#1a1715"/>
    </radialGradient>
  </defs>
  <!-- Outer bezel -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bezel)"/>
  <!-- Range arc hint on bezel -->
  <path d="M 26.8 22.3 A 12.5 12.5 0 0 1 5.2 22.3" fill="none" stroke="#c89d6a" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <!-- Knurl cap -->
  <circle cx="16" cy="16" r="10" fill="url(#cap)"/>
  <!-- Center LCD well -->
  <circle cx="16" cy="16" r="5" fill="#050807"/>
  <!-- Indicator dot at 12 o'clock -->
  <circle cx="16" cy="6.5" r="2" fill="#c89d6a"/>
</svg>
