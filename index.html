<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DF64 Bean Tracker</title>
  <link rel="icon" href="favicon/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bodoni+Moda:ital,wght@0,400;1,500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo, useCallback } = React;

    const DF64 = {
      id: 'df64_gen2',
      name: 'DF64',
      model: 'Gen 2',
      subtitle: 'Flat 64mm Burrs',
      minClick: 0,
      maxClick: 90,
      micronsPerClick: 9.67,
      zeroOffset: 180,
      majorTick: 5,
      accentColor: '#8f7f68',
      dialStartAngle: 0,
      dialSweep: 330,
    };

    const METHOD_RANGES = {
      turkish: [0, 4],
      espresso: [0, 20],
      v60: [23, 53],
      aeropress: [15, 80],
      moka: [19, 49],
      pour_over: [24, 77],
      siphon: [21, 64],
      filter_machine: [13, 74],
      french_press: [53, 90],
      cupping: [29, 69],
      cold_brew: [65, 90],
      cold_drip: [67, 90],
      steep_release: [28, 66],
    };

    const METHODS = [
      { id: 'espresso', label: 'Espresso' },
      { id: 'v60', label: 'V60' },
      { id: 'aeropress', label: 'AeroPress' },
      { id: 'moka', label: 'Moka Pot' },
      { id: 'pour_over', label: 'Pour Over' },
      { id: 'siphon', label: 'Siphon' },
      { id: 'filter_machine', label: 'Filter Machine' },
      { id: 'french_press', label: 'French Press' },
      { id: 'cupping', label: 'Cupping' },
      { id: 'cold_brew', label: 'Cold Brew' },
      { id: 'cold_drip', label: 'Cold Drip' },
      { id: 'steep_release', label: 'Steep-and-release' },
      { id: 'turkish', label: 'Turkish' },
    ];

    function clickToMicrons(click) {
      return DF64.zeroOffset + click * DF64.micronsPerClick;
    }

    function createClickSoundEngine() {
  let ctx = null;
  let enabled = true;
  const volumeScale = 1;
  let pendingVariant = null;
  let resumePromise = null;

  const emit = (audioCtx, variant) => {
    if (!audioCtx || audioCtx.state !== 'running') return;
    const t = audioCtx.currentTime;

    const bufSize = Math.floor(audioCtx.sampleRate * 0.04);
    const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufSize * 0.15));
    }

    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.value = variant === 'edge' ? 1200 : 2400;
    noiseFilter.Q.value = 2;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime((variant === 'snap' ? 0.18 : 0.09) * volumeScale, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);

    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noise.start(t);
    noise.stop(t + 0.05);

    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(variant === 'snap' ? 180 : 90, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.05);
    const oscGain = audioCtx.createGain();
    oscGain.gain.setValueAtTime(0.06 * volumeScale, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    osc.connect(oscGain);
    oscGain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + 0.07);

    if (variant === 'snap') {
      const chime = audioCtx.createOscillator();
      chime.type = 'triangle';
      chime.frequency.value = 1760;
      const chimeGain = audioCtx.createGain();
      chimeGain.gain.setValueAtTime(0.04 * volumeScale, t);
      chimeGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      chime.connect(chimeGain);
      chimeGain.connect(audioCtx.destination);
      chime.start(t);
      chime.stop(t + 0.25);
    }
  };

  const flushPending = () => {
    if (!ctx || ctx.state !== 'running' || !pendingVariant || !enabled) return;
    const variant = pendingVariant;
    pendingVariant = null;
    emit(ctx, variant);
  };

  const getCtx = () => {
    if (ctx) return ctx;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      ctx.addEventListener('statechange', flushPending);
      return ctx;
    } catch (e) {
      return null;
    }
  };

  const ensureRunning = () => {
    const audioCtx = getCtx();
    if (!audioCtx) return Promise.resolve(null);
    if (audioCtx.state === 'running') {
      flushPending();
      return Promise.resolve(audioCtx);
    }
    if (resumePromise) return resumePromise;
    resumePromise = audioCtx.resume()
      .catch(() => null)
      .then(() => {
        flushPending();
        return audioCtx;
      })
      .finally(() => {
        resumePromise = null;
      });
    return resumePromise;
  };

  const play = (variant = 'detent') => {
    if (!enabled) return;
    const audioCtx = getCtx();
    if (!audioCtx) return;
    if (audioCtx.state === 'running') {
      emit(audioCtx, variant);
      return;
    }
    pendingVariant = variant;
    ensureRunning();
  };

  const setEnabled = (next) => {
    enabled = next;
    if (enabled) ensureRunning();
  };

  const unlock = () => {
    ensureRunning();
  };

  return { play, setEnabled, unlock };
}

    function Dial({ click, setClick, methodId, methodLabel, dialOffset, playClickSound, unlockSound, vibrateFeedback }) {
      const dialRef = useRef(null);
      const dragRef = useRef({ active: false, lastClick: click });
      const lastSoundClickRef = useRef(click);
      const labelHideTimerRef = useRef(null);
      const rangePulseTimerRef = useRef(null);
      const [labelsVisible, setLabelsVisible] = useState(false);
      const [rangePulse, setRangePulse] = useState(false);
      const range = METHOD_RANGES[methodId] || [DF64.minClick, DF64.maxClick];
      const totalClicks = DF64.maxClick - DF64.minClick;
      const dialStart = DF64.dialStartAngle + dialOffset;

      const clickToAngleDeg = useCallback((c) => {
        const t = (c - DF64.minClick) / totalClicks;
        return dialStart + t * DF64.dialSweep;
      }, [dialStart, totalClicks]);

      const normalizeDeg = useCallback((deg) => {
        let n = deg % 360;
        if (n < 0) n += 360;
        return n;
      }, []);

      const angleToClick = useCallback((angleDeg) => {
        const start = normalizeDeg(dialStart);
        const pointer = normalizeDeg(angleDeg);
        let rel = pointer - start;
        if (rel < 0) rel += 360;

        if (rel > DF64.dialSweep) {
          const distToStart = Math.min(rel, 360 - rel);
          const distToEndRaw = Math.abs(rel - DF64.dialSweep);
          const distToEnd = Math.min(distToEndRaw, 360 - distToEndRaw);
          rel = distToStart <= distToEnd ? 0 : DF64.dialSweep;
        }

        const t = rel / DF64.dialSweep;
        const mapped = DF64.minClick + t * totalClicks;
        return Math.max(DF64.minClick, Math.min(DF64.maxClick, Math.round(mapped)));
      }, [dialStart, normalizeDeg, totalClicks]);

      const getAngleFromEvent = (e) => {
        const rect = dialRef.current.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - cx;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - cy;
        return (Math.atan2(y, x) * 180) / Math.PI + 90;
      };

      const handlePointerDown = (e) => {
        e.preventDefault();
        setLabelsVisible(true);
        if (unlockSound) unlockSound();
        dragRef.current = {
          active: true,
          lastClick: click,
        };
      };

      const handlePointerMove = useCallback((e) => {
        if (!dragRef.current.active) return;
        if (e.touches) e.preventDefault();
        const currentAngle = getAngleFromEvent(e);
        const next = angleToClick(currentAngle);
        if (next !== dragRef.current.lastClick) {
          setClick(next);
          dragRef.current.lastClick = next;
        }
      }, [angleToClick, setClick]);

      useEffect(() => {
        const move = (e) => handlePointerMove(e);
        const up = () => {
          dragRef.current.active = false;
          if (labelHideTimerRef.current) clearTimeout(labelHideTimerRef.current);
          labelHideTimerRef.current = setTimeout(() => {
            setLabelsVisible(false);
            labelHideTimerRef.current = null;
          }, 900);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
        window.addEventListener('touchmove', move, { passive: false });
        window.addEventListener('touchend', up);
        return () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup', up);
          window.removeEventListener('touchmove', move);
          window.removeEventListener('touchend', up);
          if (labelHideTimerRef.current) clearTimeout(labelHideTimerRef.current);
          if (rangePulseTimerRef.current) clearTimeout(rangePulseTimerRef.current);
        };
      }, [handlePointerMove]);

      useEffect(() => {
        if (lastSoundClickRef.current !== click) {
          const inRange = click >= range[0] && click <= range[1];
          const wasInRange = lastSoundClickRef.current >= range[0] && lastSoundClickRef.current <= range[1];
          const enteringRange = inRange && !wasInRange;
          const atEdge = click === DF64.minClick || click === DF64.maxClick;
          const variant = atEdge ? 'edge' : enteringRange ? 'snap' : 'detent';
          playClickSound(variant);
          if (vibrateFeedback) vibrateFeedback(variant);
          if (enteringRange) {
            setRangePulse(true);
            if (rangePulseTimerRef.current) clearTimeout(rangePulseTimerRef.current);
            rangePulseTimerRef.current = setTimeout(() => {
              setRangePulse(false);
              rangePulseTimerRef.current = null;
            }, 240);
          }
          lastSoundClickRef.current = click;
        }
      }, [click, range, playClickSound, vibrateFeedback]);

      const numberedTicks = useMemo(() => {
        const ticks = [];
        for (let c = DF64.minClick; c <= DF64.maxClick; c++) {
          ticks.push({ click: c, angle: clickToAngleDeg(c), major: c % DF64.majorTick === 0 });
        }
        return ticks;
      }, [clickToAngleDeg]);

      const polar = (cx, cy, r, angleDeg) => {
        const rad = ((angleDeg - 90) * Math.PI) / 180;
        return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
      };

      const describeArc = (cx, cy, r, startAngle, endAngle) => {
        const start = polar(cx, cy, r, startAngle);
        const end = polar(cx, cy, r, endAngle);
        let sweep = endAngle - startAngle;
        while (sweep < 0) sweep += 360;
        while (sweep >= 360) sweep -= 360;
        const largeArcFlag = sweep > 180 ? '1' : '0';
        return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 1 ${end.x} ${end.y}`;
      };

      const angleDeg = clickToAngleDeg(click);
      const rangeStartAngle = clickToAngleDeg(range[0]);
      const rangeEndAngle = clickToAngleDeg(range[1]);
      const rangeStartPoint = polar(140, 140, 124, rangeStartAngle);
      const rangeEndPoint = polar(140, 140, 124, rangeEndAngle);
      const rangeStartLabelPoint = polar(140, 140, 136, rangeStartAngle);
      const rangeEndLabelPoint = polar(140, 140, 136, rangeEndAngle);
      const inRecommended = click >= range[0] && click <= range[1];

      const stepClick = (delta) => {
        const next = Math.max(DF64.minClick, Math.min(DF64.maxClick, click + delta));
        if (next === click) {
          playClickSound('edge');
          return;
        }
        setClick(next);
      };

      return (
        <div className="flex flex-col items-center select-none w-full">
          <div className="mb-4 px-3 py-1.5 rounded-md flex flex-col items-center"
            style={{
              background: 'linear-gradient(180deg, #1f1c1a 0%, #141211 100%)',
              boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.06), 0 1px 2px rgba(0,0,0,0.6)',
              border: '1px solid #0a0908',
            }}>
            <div className="text-[11px] tracking-[0.05em] uppercase text-stone-200" style={{ fontFamily: '"DM Mono", monospace' }}>
              {DF64.name} {DF64.model}
            </div>
            <div className="text-[9px] tracking-[0.07em] uppercase mt-0.5" style={{ color: DF64.accentColor, fontFamily: '"DM Mono", monospace' }}>
              {DF64.subtitle}
            </div>
          </div>

          <div
            className="relative"
            style={{ width: 280, height: 280 }}
            onMouseEnter={() => setLabelsVisible(true)}
            onMouseLeave={() => setLabelsVisible(false)}
            onTouchStart={() => setLabelsVisible(true)}
          >
            <div
              className="absolute inset-0 rounded-full"
              style={{
                background: 'radial-gradient(circle at 30% 25%, #2a2724 0%, #0a0908 80%)',
                boxShadow: '0 12px 40px rgba(0,0,0,0.7), 0 2px 4px rgba(0,0,0,0.5)',
              }}
            />

            <svg className="absolute inset-0" viewBox="0 0 280 280" style={{ pointerEvents: 'none' }}>
              <defs>
                <radialGradient id="bezelGrad" cx="30%" cy="20%">
                  <stop offset="0%" stopColor="#3a3530" />
                  <stop offset="60%" stopColor="#1a1715" />
                  <stop offset="100%" stopColor="#050403" />
                </radialGradient>
              </defs>

              <circle cx="140" cy="140" r="138" fill="url(#bezelGrad)" />

              <path
                d={describeArc(140, 140, 124, rangeStartAngle, rangeEndAngle)}
                fill="none"
                stroke={DF64.accentColor}
                strokeWidth={rangePulse ? 4 : 3}
                strokeLinecap="round"
                opacity={inRecommended ? 0.96 : 0.5}
                style={{
                  filter: inRecommended ? `drop-shadow(0 0 ${rangePulse ? 10 : 6}px ${DF64.accentColor})` : 'none',
                  transition: 'opacity 0.25s ease, filter 0.25s ease, stroke-width 0.2s ease',
                }}
              />
              <circle
                cx={rangeStartPoint.x}
                cy={rangeStartPoint.y}
                r="2.2"
                fill={DF64.accentColor}
                opacity={inRecommended ? 0.98 : 0.75}
                style={{ filter: inRecommended ? `drop-shadow(0 0 4px ${DF64.accentColor})` : 'none' }}
              />
              <circle
                cx={rangeEndPoint.x}
                cy={rangeEndPoint.y}
                r="2.2"
                fill={DF64.accentColor}
                opacity={inRecommended ? 0.98 : 0.75}
                style={{ filter: inRecommended ? `drop-shadow(0 0 4px ${DF64.accentColor})` : 'none' }}
              />
              <text
                x={rangeStartLabelPoint.x}
                y={rangeStartLabelPoint.y}
                fill={DF64.accentColor}
                fontSize="8"
                textAnchor="middle"
                dominantBaseline="middle"
                style={{
                  fontFamily: '"DM Mono", monospace',
                  opacity: labelsVisible ? 0.9 : 0,
                  transition: 'opacity 0.2s ease',
                }}
              >
                {range[0]}
              </text>
              <text
                x={rangeEndLabelPoint.x}
                y={rangeEndLabelPoint.y}
                fill={DF64.accentColor}
                fontSize="8"
                textAnchor="middle"
                dominantBaseline="middle"
                style={{
                  fontFamily: '"DM Mono", monospace',
                  opacity: labelsVisible ? 0.9 : 0,
                  transition: 'opacity 0.2s ease',
                }}
              >
                {range[1]}
              </text>

              {numberedTicks.map((t) => {
                const rad = ((t.angle - 90) * Math.PI) / 180;
                const r1 = 116;
                const r2 = t.major ? 106 : 112;
                return (
                  <line
                    key={t.click}
                    x1={140 + r1 * Math.cos(rad)}
                    y1={140 + r1 * Math.sin(rad)}
                    x2={140 + r2 * Math.cos(rad)}
                    y2={140 + r2 * Math.sin(rad)}
                    stroke={t.major ? '#d4ccc0' : '#6a625a'}
                    strokeWidth={t.major ? 1.4 : 0.8}
                    opacity="0.85"
                  />
                );
              })}

              {numberedTicks.filter((t) => t.major).map((t) => {
                const p = polar(140, 140, 96, t.angle);
                return (
                  <text
                    key={`n-${t.click}`}
                    x={p.x}
                    y={p.y}
                    fill="#a8a098"
                    fontSize="10"
                    textAnchor="middle"
                    dominantBaseline="middle"
                    style={{ fontFamily: '"DM Mono", monospace', fontWeight: 500 }}
                  >
                    {t.click}
                  </text>
                );
              })}
            </svg>

            <div
              className="absolute left-1/2 -translate-x-1/2"
              style={{
                top: 8,
                width: 0,
                height: 0,
                borderLeft: '5px solid transparent',
                borderRight: '5px solid transparent',
                borderTop: `9px solid ${DF64.accentColor}`,
                filter: `drop-shadow(0 0 4px ${DF64.accentColor})`,
                opacity: 0.9,
              }}
            />

            <div
              ref={dialRef}
              onMouseDown={handlePointerDown}
              onTouchStart={handlePointerDown}
              className="absolute rounded-full cursor-grab active:cursor-grabbing"
              style={{
                left: 50,
                top: 50,
                width: 180,
                height: 180,
                background: 'radial-gradient(circle at 30% 25%, #4a4540 0%, #2a2520 35%, #0a0908 100%)',
                boxShadow: 'inset 0 2px 4px rgba(255,255,255,0.08), inset 0 -3px 8px rgba(0,0,0,0.8), 0 4px 16px rgba(0,0,0,0.7)',
                transform: `rotate(${angleDeg}deg)`,
                transition: dragRef.current.active ? 'none' : 'transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1)',
                touchAction: 'none',
              }}
            >
              <svg className="absolute inset-0 w-full h-full" viewBox="0 0 180 180" style={{ pointerEvents: 'none' }}>
                {[...Array(60)].map((_, i) => {
                  const deg = (i / 60) * 360;
                  const rad = ((deg - 90) * Math.PI) / 180;
                  const r1 = 76;
                  const r2 = 86;
                  return (
                    <line
                      key={i}
                      x1={90 + r1 * Math.cos(rad)}
                      y1={90 + r1 * Math.sin(rad)}
                      x2={90 + r2 * Math.cos(rad)}
                      y2={90 + r2 * Math.sin(rad)}
                      stroke={i % 2 === 0 ? '#5a534c' : '#1a1715'}
                      strokeWidth="1"
                    />
                  );
                })}
                <circle cx="90" cy="22" r="4" fill={DF64.accentColor} />
                <circle cx="90" cy="90" r="58" fill="#0a0908" stroke="#000" strokeWidth="1.5" />
              </svg>
            </div>

            <div
              className="absolute rounded-full flex flex-col items-center justify-center"
              style={{
                left: 90,
                top: 90,
                width: 100,
                height: 100,
                background: 'radial-gradient(circle at 50% 30%, #1a2520 0%, #0a1410 70%, #050807 100%)',
                boxShadow: 'inset 0 3px 8px rgba(0,0,0,0.95), inset 0 -1px 2px rgba(255,255,255,0.05)',
                border: '1px solid #000',
                pointerEvents: 'none',
              }}
            >
              <div className="text-[8px] tracking-[0.08em] uppercase mb-0.5" style={{ color: DF64.accentColor, opacity: 0.6, fontFamily: '"DM Mono", monospace' }}>
                Click
              </div>
              <div className="text-[44px] leading-none font-bold tabular-nums" style={{ color: DF64.accentColor, fontFamily: '"DM Mono", monospace', letterSpacing: '-0.02em' }}>
                {String(click).padStart(2, '0')}
              </div>
              <div className="text-[8px] tracking-[0.06em] mt-0.5" style={{ color: DF64.accentColor, opacity: 0.55, fontFamily: '"DM Mono", monospace' }}>
                ~{Math.round(clickToMicrons(click))}um
              </div>
            </div>
          </div>

          <div className="mt-5 w-full max-w-[280px]">
            <div className="grid grid-cols-2 gap-2">
              <button
                onClick={() => stepClick(-1)}
                disabled={click <= DF64.minClick}
                className="h-12 rounded-lg flex items-center justify-center text-stone-200 text-xl"
                style={{
                  background: 'linear-gradient(180deg, #2a2520 0%, #14110f 100%)',
                  border: '1px solid #0a0908',
                  fontFamily: '"DM Mono", monospace',
                  opacity: click <= DF64.minClick ? 0.35 : 1,
                }}
              >
                -
              </button>
              <button
                onClick={() => stepClick(1)}
                disabled={click >= DF64.maxClick}
                className="h-12 rounded-lg flex items-center justify-center text-stone-200 text-xl"
                style={{
                  background: 'linear-gradient(180deg, #2a2520 0%, #14110f 100%)',
                  border: '1px solid #0a0908',
                  fontFamily: '"DM Mono", monospace',
                  opacity: click >= DF64.maxClick ? 0.35 : 1,
                }}
              >
                +
              </button>
            </div>
            <button
              onClick={() => {
                const next = Math.round((range[0] + range[1]) / 2);
                if (next !== click) {
                  setClick(next);
                }
              }}
              className="mt-2 w-full h-10 rounded-md text-[9px] uppercase tracking-[0.06em]"
              style={{
                fontFamily: '"DM Mono", monospace',
                background: 'linear-gradient(180deg, #2a2520 0%, #14110f 100%)',
                color: '#b4ac9f',
                border: '1px solid #2a2520',
              }}
            >
              Set Midpoint
            </button>
          </div>

          <div className="mt-3 text-[9px] text-stone-500 text-center leading-relaxed"
            style={{ fontFamily: '"DM Mono", monospace', letterSpacing: '0.05em' }}>
            HCG {methodLabel} range: {range[0]}-{range[1]} clicks · ~{Math.round(clickToMicrons(range[0]))}-{Math.round(clickToMicrons(range[1]))}um
          </div>
          <div className="mt-1 text-[9px] uppercase tracking-[0.06em]"
            style={{
              fontFamily: '"DM Mono", monospace',
              color: inRecommended ? DF64.accentColor : '#7f7770',
              opacity: inRecommended ? 0.95 : 0.75,
            }}>
            {inRecommended ? 'In Recommended Range' : 'Outside Recommended Range'}
          </div>
        </div>
      );
    }

    function App() {
      const PRESETS_KEY = 'df64-bean-presets-v1';
      const OFFSET_KEY = 'df64-dial-offset-v1';
      const SOUND_KEY = 'df64-sound-on-v1';
      const SORT_KEY = 'df64-bean-sort-v1';
      const DENSITY_KEY = 'df64-bean-density-v1';
      const LEGACY_SOUND_PROFILE_KEY = 'df64-sound-profile-v1';

      const [methodId, setMethodId] = useState('espresso');
      const [click, setClick] = useState(10);
      const [beanName, setBeanName] = useState('');
      const [beanSearch, setBeanSearch] = useState('');
      const [presets, setPresets] = useState([]);
      const [dialOffset, setDialOffset] = useState(0);
      const [soundOn, setSoundOn] = useState(true);
      const [sortMode, setSortMode] = useState('latest');
      const [density, setDensity] = useState('comfortable');
      const [undoAction, setUndoAction] = useState(null);
      const [undoSecondsLeft, setUndoSecondsLeft] = useState(0);
      const [feedbackText, setFeedbackText] = useState('');
      const soundEngineRef = useRef(createClickSoundEngine());
      const feedbackTimerRef = useRef(null);
      const undoTimerRef = useRef(null);
      const undoTickRef = useRef(null);

      const toTimestamp = useCallback((value) => {
        return new Date(value).getTime() || 0;
      }, []);

      const getSegmentButtonStyle = useCallback((active) => ({
        fontFamily: '"DM Mono", monospace',
        background: active
          ? 'linear-gradient(180deg, #2a2520 0%, #14110f 100%)'
          : 'linear-gradient(180deg, #1a1715 0%, #100e0c 100%)',
        color: active ? '#c89d6a' : '#8c847b',
        border: '1px solid #2a2520',
      }), []);

      const methodLabel = (METHODS.find((m) => m.id === methodId) || {}).label || methodId;
      const visiblePresets = useMemo(() => {
        const q = beanSearch.trim().toLowerCase();
        const filtered = q ? presets.filter((preset) => {
          const method = METHODS.find((m) => m.id === preset.methodId);
          const methodText = method ? method.label.toLowerCase() : preset.methodId.toLowerCase();
          return preset.bean.toLowerCase().includes(q) || methodText.includes(q);
        }) : presets.slice();

        if (sortMode === 'alpha') {
          filtered.sort((a, b) => {
            const beanCmp = a.bean.localeCompare(b.bean, undefined, { sensitivity: 'base' });
            if (beanCmp !== 0) return beanCmp;
            return toTimestamp(b.savedAt) - toTimestamp(a.savedAt);
          });
          return filtered;
        }

        filtered.sort((a, b) => {
          return toTimestamp(b.savedAt) - toTimestamp(a.savedAt);
        });
        return filtered;
      }, [beanSearch, presets, sortMode, toTimestamp]);

      const startUndoWindow = useCallback((action) => {
        setUndoAction(action);
        setUndoSecondsLeft(5);
        if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
        if (undoTickRef.current) clearInterval(undoTickRef.current);

        undoTickRef.current = setInterval(() => {
          setUndoSecondsLeft((prev) => {
            if (prev <= 1) {
              if (undoTickRef.current) {
                clearInterval(undoTickRef.current);
                undoTickRef.current = null;
              }
              return 0;
            }
            return prev - 1;
          });
        }, 1000);

        undoTimerRef.current = setTimeout(() => {
          setUndoAction(null);
          setUndoSecondsLeft(0);
          undoTimerRef.current = null;
          if (undoTickRef.current) {
            clearInterval(undoTickRef.current);
            undoTickRef.current = null;
          }
        }, 5000);
      }, []);

      const playClickSound = useCallback((variant) => {
        soundEngineRef.current.play(variant);
      }, []);

      const unlockSound = useCallback(() => {
        if (soundEngineRef.current && soundEngineRef.current.unlock) {
          soundEngineRef.current.unlock();
        }
      }, []);

      const vibrateFeedback = useCallback((variant) => {
        if (!navigator.vibrate) return;
        if (variant === 'edge') navigator.vibrate(18);
        else if (variant === 'snap') navigator.vibrate([12, 24, 16]);
        else navigator.vibrate(8);
      }, []);

      const showFeedback = useCallback((text) => {
        setFeedbackText(text);
        if (feedbackTimerRef.current) clearTimeout(feedbackTimerRef.current);
        feedbackTimerRef.current = setTimeout(() => {
          setFeedbackText('');
          feedbackTimerRef.current = null;
        }, 1400);
      }, []);

      useEffect(() => {
        const r = METHOD_RANGES[methodId];
        if (r) setClick(Math.round((r[0] + r[1]) / 2));
      }, [methodId]);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(PRESETS_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) setPresets(parsed);
        } catch (e) {}
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
        } catch (e) {}
      }, [presets]);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(OFFSET_KEY);
          if (raw == null) return;
          const parsed = Number(raw);
          if (!Number.isNaN(parsed)) setDialOffset(Math.max(-25, Math.min(25, Math.round(parsed))));
        } catch (e) {}
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(OFFSET_KEY, String(dialOffset));
        } catch (e) {}
      }, [dialOffset]);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(SOUND_KEY);
          if (raw == null) return;
          setSoundOn(raw === 'true');
        } catch (e) {}
      }, []);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(SORT_KEY);
          if (raw === 'latest' || raw === 'alpha') setSortMode(raw);
        } catch (e) {}
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(SORT_KEY, sortMode);
        } catch (e) {}
      }, [sortMode]);

      useEffect(() => {
        try {
          const raw = localStorage.getItem(DENSITY_KEY);
          if (raw === 'compact' || raw === 'comfortable') setDensity(raw);
        } catch (e) {}
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(DENSITY_KEY, density);
        } catch (e) {}
      }, [density]);

      useEffect(() => {
        try {
          localStorage.removeItem(LEGACY_SOUND_PROFILE_KEY);
        } catch (e) {}
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(SOUND_KEY, soundOn ? 'true' : 'false');
        } catch (e) {}
        soundEngineRef.current.setEnabled(soundOn);
      }, [soundOn]);

      useEffect(() => {
        return () => {
          if (feedbackTimerRef.current) clearTimeout(feedbackTimerRef.current);
          if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
          if (undoTickRef.current) clearInterval(undoTickRef.current);
        };
      }, []);

      useEffect(() => {
        const onKeyDown = (e) => {
          const tag = e.target && e.target.tagName ? e.target.tagName.toLowerCase() : '';
          if (tag === 'input' || tag === 'textarea' || (e.target && e.target.isContentEditable)) return;

          if (e.key === 'ArrowLeft' || e.key === '-') {
            e.preventDefault();
            setClick((prev) => Math.max(DF64.minClick, prev - 1));
            return;
          }

          if (e.key === 'ArrowRight' || e.key === '+') {
            e.preventDefault();
            setClick((prev) => Math.min(DF64.maxClick, prev + 1));
            return;
          }

          if (e.key === 'm' || e.key === 'M') {
            e.preventDefault();
            const r = METHOD_RANGES[methodId] || [DF64.minClick, DF64.maxClick];
            setClick(Math.round((r[0] + r[1]) / 2));
          }
        };

        window.addEventListener('keydown', onKeyDown);
        return () => window.removeEventListener('keydown', onKeyDown);
      }, [methodId]);

      const saveBean = () => {
        const bean = beanName.trim();
        if (!bean) return;
        const key = `${bean.toLowerCase()}::${methodId}`;
        const record = {
          id: Date.now(),
          key,
          bean,
          methodId,
          click,
          savedAt: new Date().toISOString(),
        };
        setPresets((prev) => {
          const rest = prev.filter((p) => p.key !== key);
          return [record, ...rest].slice(0, 60);
        });
        setBeanName('');
        playClickSound('snap');
        showFeedback(`Saved ${bean} at click ${click}`);
      };

      const loadBean = (preset) => {
        setMethodId(preset.methodId);
        setClick(Math.max(DF64.minClick, Math.min(DF64.maxClick, preset.click)));
        playClickSound('snap');
        showFeedback(`Loaded ${preset.bean}`);
      };

      const removeBean = (id) => {
        setPresets((prev) => {
          const index = prev.findIndex((p) => p.id === id);
          if (index === -1) return prev;
          const removed = prev[index];
          const next = prev.filter((p) => p.id !== id);
          startUndoWindow({ type: 'single', removed, index });
          showFeedback(`Deleted ${removed.bean}`);
          return next;
        });
        playClickSound('tick');
      };

      const clearAllBeans = () => {
        if (presets.length === 0) return;
        const ok = window.confirm('Delete all saved bean presets?');
        if (!ok) return;
        startUndoWindow({ type: 'all', removed: presets.slice() });
        setPresets([]);
        playClickSound('edge');
        showFeedback('Deleted all bean presets');
      };

      const undoDelete = () => {
        if (!undoAction) return;

        if (undoAction.type === 'single') {
          setPresets((prev) => {
            if (prev.some((p) => p.id === undoAction.removed.id)) return prev;
            const next = prev.slice();
            const insertAt = Math.max(0, Math.min(undoAction.index, next.length));
            next.splice(insertAt, 0, undoAction.removed);
            return next;
          });
          showFeedback(`Restored ${undoAction.removed.bean}`);
        }

        if (undoAction.type === 'all') {
          setPresets(undoAction.removed);
          showFeedback('Restored all bean presets');
        }

        if (undoTimerRef.current) {
          clearTimeout(undoTimerRef.current);
          undoTimerRef.current = null;
        }
        if (undoTickRef.current) {
          clearInterval(undoTickRef.current);
          undoTickRef.current = null;
        }
        setUndoSecondsLeft(0);
        setUndoAction(null);
        playClickSound('snap');
      };

      const dismissUndo = () => {
        if (undoTimerRef.current) {
          clearTimeout(undoTimerRef.current);
          undoTimerRef.current = null;
        }
        if (undoTickRef.current) {
          clearInterval(undoTickRef.current);
          undoTickRef.current = null;
        }
        setUndoSecondsLeft(0);
        setUndoAction(null);
      };

      return (
        <div
          className="min-h-screen w-full overflow-x-hidden"
          style={{
            background: 'radial-gradient(ellipse at top, #1a1715 0%, #0a0807 60%, #050403 100%)',
            fontFamily: '"Inter", -apple-system, sans-serif',
          }}
        >
          <style>{`
            body { background: #050403; margin: 0; }
            .grain-overlay::before {
              content: '';
              position: fixed;
              inset: 0;
              pointer-events: none;
              opacity: 0.05;
              z-index: 100;
              background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
            }
          `}</style>
          <div className="grain-overlay" />

          <header
            className="sticky top-0 z-30 px-4 py-3"
            style={{
              background: 'linear-gradient(180deg, #14110f 0%, #0a0807 100%)',
              borderBottom: '1px solid #000',
              boxShadow: '0 2px 8px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05)',
            }}
          >
            <div className="flex items-center justify-between">
              <div className="w-[72px]" />
              <div className="flex flex-col items-center">
                <div className="text-[10px] tracking-[0.12em] uppercase text-stone-500" style={{ fontFamily: '"DM Mono", monospace' }}>
                  Personal Grinder
                </div>
                <div
                  className="text-[18px] leading-none mt-0.5 text-stone-100"
                  style={{
                    fontFamily: '"Bodoni Moda", serif',
                    fontStyle: 'italic',
                    fontWeight: 500,
                    letterSpacing: '0.04em',
                  }}
                >
                  DF64 Bean Tracker
                </div>
              </div>
              <button
                onClick={() => {
                  setSoundOn((v) => !v);
                }}
                className="w-[72px] px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                style={{
                  fontFamily: '"DM Mono", monospace',
                  background: 'linear-gradient(180deg, #2a2520 0%, #14110f 100%)',
                  color: soundOn ? '#c89d6a' : '#8a847b',
                  border: '1px solid #2a2520',
                }}
              >
                {soundOn ? 'Sound On' : 'Sound Off'}
              </button>
            </div>
          </header>

          <main className="px-4 pt-6 pb-20 max-w-md mx-auto">
            <section
              className="mb-5 rounded-md border px-3 py-3"
              style={{
                background: 'linear-gradient(180deg, #14110f 0%, #0a0807 100%)',
                borderColor: '#1f1a16',
                boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.04), 0 2px 6px rgba(0,0,0,0.45)',
              }}
            >
              <div className="text-[10px] uppercase text-stone-400 tracking-[0.08em]" style={{ fontFamily: '"DM Mono", monospace' }}>
                Bean to Click
              </div>
              <div className="mt-2 flex gap-2 items-center">
                <input
                  value={beanName}
                  onChange={(e) => setBeanName(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      saveBean();
                    }
                  }}
                  placeholder="Bean name"
                  aria-label="Bean name"
                  className="flex-1 rounded-md px-3 py-2 text-[11px] text-stone-200 placeholder:text-stone-600 outline-none"
                  style={{
                    fontFamily: '"DM Mono", monospace',
                    background: '#0d0a09',
                    border: '1px solid #2a2520',
                  }}
                />
                <button
                  onClick={saveBean}
                  title="Save bean and current click"
                  className="px-3 py-2 rounded-md text-[10px] uppercase tracking-[0.06em]"
                  style={{
                    fontFamily: '"DM Mono", monospace',
                    background: 'linear-gradient(180deg, #2a2520 0%, #14110f 100%)',
                    color: '#d6cec2',
                    border: '1px solid #3a332d',
                  }}
                >
                  Save
                </button>
              </div>
              <div className="mt-2 text-[9px] text-stone-600 leading-relaxed" style={{ fontFamily: '"DM Mono", monospace', letterSpacing: '0.05em' }}>
                Saves current method and click for this bean. Use as a starting point and adjust by taste.
              </div>
            </section>

            <div className="mb-5 -mx-1">
              <div className="flex flex-wrap gap-1.5 px-1">
                {METHODS.map((m) => {
                  const active = m.id === methodId;
                  return (
                    <button
                      key={m.id}
                      onClick={() => setMethodId(m.id)}
                      className="flex-shrink-0 px-3 py-1.5 rounded-full text-[10px] tracking-[0.06em] uppercase"
                      style={{
                        background: active
                          ? 'linear-gradient(180deg, #c89d6a 0%, #8a6a44 100%)'
                          : 'linear-gradient(180deg, #1f1c1a 0%, #14110f 100%)',
                        color: active ? '#0a0807' : '#a8a098',
                        border: active ? '1px solid #5a4530' : '1px solid #0a0908',
                        fontFamily: '"DM Mono", monospace',
                      }}
                    >
                      {m.label}
                    </button>
                  );
                })}
              </div>
            </div>

            <div className="mb-3 flex items-center justify-center gap-2 flex-wrap">
              <button
                onClick={() => setDialOffset((v) => Math.max(-25, v - 1))}
                className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                style={{
                  fontFamily: '"DM Mono", monospace',
                  background: 'linear-gradient(180deg, #2a2520 0%, #14110f 100%)',
                  color: '#a8a098',
                  border: '1px solid #2a2520',
                }}
              >
                Align -
              </button>
              <div className="text-[9px] uppercase text-stone-500 tracking-[0.05em]" style={{ fontFamily: '"DM Mono", monospace' }}>
                Dial Offset {dialOffset > 0 ? `+${dialOffset}` : dialOffset}deg
              </div>
              <button
                onClick={() => setDialOffset((v) => Math.min(25, v + 1))}
                className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                style={{
                  fontFamily: '"DM Mono", monospace',
                  background: 'linear-gradient(180deg, #2a2520 0%, #14110f 100%)',
                  color: '#a8a098',
                  border: '1px solid #2a2520',
                }}
              >
                Align +
              </button>
              <button
                onClick={() => setDialOffset(0)}
                className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                style={{
                  fontFamily: '"DM Mono", monospace',
                  background: 'linear-gradient(180deg, #1f1c1a 0%, #14110f 100%)',
                  color: '#7d756c',
                  border: '1px solid #23201c',
                }}
              >
                Reset
              </button>
            </div>

            <div className="flex justify-center mb-5">
              <Dial
                click={click}
                setClick={setClick}
                methodId={methodId}
                methodLabel={methodLabel}
                dialOffset={dialOffset}
                playClickSound={playClickSound}
                unlockSound={unlockSound}
                vibrateFeedback={vibrateFeedback}
              />
            </div>

            {feedbackText && (
              <div className="mb-4 text-center text-[10px] uppercase tracking-[0.06em]"
                style={{
                  fontFamily: '"DM Mono", monospace',
                  color: '#c89d6a',
                }}>
                {feedbackText}
              </div>
            )}

            <section
              className="rounded-md border px-3 py-3"
              style={{
                background: 'linear-gradient(180deg, #14110f 0%, #0a0807 100%)',
                borderColor: '#1f1a16',
              }}
            >
              <div className="mb-2 flex items-center justify-between">
                <div className="text-[10px] uppercase text-stone-400 tracking-[0.08em]" style={{ fontFamily: '"DM Mono", monospace' }}>
                  Saved Beans
                </div>
                <button
                  onClick={clearAllBeans}
                  disabled={presets.length === 0}
                  title="Delete all saved beans"
                  className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                  style={{
                    fontFamily: '"DM Mono", monospace',
                    background: 'linear-gradient(180deg, #2a1f1f 0%, #14100f 100%)',
                    color: '#a88181',
                    border: '1px solid #2a201f',
                    opacity: presets.length === 0 ? 0.35 : 1,
                  }}
                >
                  Delete All
                </button>
              </div>
              <div className="mb-2 flex items-center justify-between gap-2 flex-wrap">
                <div className="flex items-center gap-1">
                  <button
                    onClick={() => setSortMode('latest')}
                    className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                    style={getSegmentButtonStyle(sortMode === 'latest')}
                  >
                    Latest
                  </button>
                  <button
                    onClick={() => setSortMode('alpha')}
                    className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                    style={getSegmentButtonStyle(sortMode === 'alpha')}
                  >
                    A-Z
                  </button>
                </div>

                <div className="flex items-center gap-1">
                  <button
                    onClick={() => setDensity('compact')}
                    className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                    style={getSegmentButtonStyle(density === 'compact')}
                  >
                    Compact
                  </button>
                  <button
                    onClick={() => setDensity('comfortable')}
                    className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                    style={getSegmentButtonStyle(density === 'comfortable')}
                  >
                    Comfortable
                  </button>
                </div>
              </div>
              <div className="mb-2">
                <input
                  value={beanSearch}
                  onChange={(e) => setBeanSearch(e.target.value)}
                  placeholder="Search beans or method"
                  aria-label="Search beans or method"
                  className="w-full rounded-md px-3 py-2 text-[10px] text-stone-200 placeholder:text-stone-600 outline-none"
                  style={{
                    fontFamily: '"DM Mono", monospace',
                    background: '#0d0a09',
                    border: '1px solid #2a2520',
                  }}
                />
              </div>
              <div className="flex flex-wrap gap-2 pb-1">
                {visiblePresets.length === 0 ? (
                  <div className="text-[10px] text-stone-600 py-1" style={{ fontFamily: '"DM Mono", monospace' }}>
                    {presets.length === 0 ? 'No beans saved yet.' : 'No beans match this search.'}
                  </div>
                ) : (
                  visiblePresets.map((preset) => {
                    const m = METHODS.find((x) => x.id === preset.methodId);
                    return (
                      <div
                        key={preset.id}
                        className="flex-shrink-0 rounded-md min-w-[190px]"
                        style={{
                          padding: density === 'compact' ? '0.45rem 0.55rem' : '0.55rem 0.75rem',
                          background: 'linear-gradient(180deg, #1a1614 0%, #100d0c 100%)',
                          border: '1px solid #2a2520',
                        }}
                      >
                        <button onClick={() => loadBean(preset)} className="text-left w-full">
                          <div
                            className="text-stone-200"
                            style={{
                              fontFamily: '"DM Mono", monospace',
                              fontSize: density === 'compact' ? '10px' : '11px',
                            }}
                          >
                            {preset.bean}
                          </div>
                          <div
                            className="uppercase text-stone-500"
                            style={{
                              marginTop: density === 'compact' ? '2px' : '4px',
                              fontFamily: '"DM Mono", monospace',
                              letterSpacing: '0.05em',
                              fontSize: '9px',
                            }}
                          >
                            {(m ? m.label : preset.methodId)}
                          </div>
                          <div
                            className="text-stone-300 tabular-nums"
                            style={{
                              marginTop: density === 'compact' ? '2px' : '4px',
                              fontFamily: '"DM Mono", monospace',
                              fontSize: density === 'compact' ? '9px' : '10px',
                            }}
                          >
                            Click {String(preset.click).padStart(2, '0')}
                          </div>
                        </button>
                        <button
                          onClick={() => removeBean(preset.id)}
                          title={`Delete ${preset.bean}`}
                          className="px-2 py-1 rounded text-[9px] uppercase"
                          style={{
                            marginTop: density === 'compact' ? '4px' : '8px',
                            fontFamily: '"DM Mono", monospace',
                            letterSpacing: '0.05em',
                            color: '#a88181',
                            background: 'linear-gradient(180deg, #2a1f1f 0%, #14100f 100%)',
                            border: '1px solid #2a201f',
                          }}
                        >
                          Delete
                        </button>
                      </div>
                    );
                  })
                )}
              </div>
            </section>

            {undoAction && (
              <div
                className="fixed left-1/2 -translate-x-1/2 bottom-4 w-[calc(100%-2rem)] max-w-md rounded-md border px-3 py-2 z-40 flex items-center justify-between"
                style={{
                  background: 'linear-gradient(180deg, #191412 0%, #0f0b0a 100%)',
                  borderColor: '#3a2e2c',
                  boxShadow: '0 8px 24px rgba(0,0,0,0.45)',
                }}
                role="status"
                aria-live="polite"
              >
                <div className="text-[10px] text-stone-300" style={{ fontFamily: '"DM Mono", monospace' }}>
                  {undoAction.type === 'single' ? 'Bean deleted.' : 'All beans deleted.'} Undo ({undoSecondsLeft}s)?
                </div>
                <div className="flex items-center gap-1">
                  <button
                    onClick={undoDelete}
                    className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                    style={{
                      fontFamily: '"DM Mono", monospace',
                      background: 'linear-gradient(180deg, #2a2520 0%, #14110f 100%)',
                      color: '#c89d6a',
                      border: '1px solid #2a2520',
                    }}
                  >
                    Undo
                  </button>
                  <button
                    onClick={dismissUndo}
                    className="px-2 py-1 rounded text-[9px] uppercase tracking-[0.05em]"
                    style={{
                      fontFamily: '"DM Mono", monospace',
                      background: 'linear-gradient(180deg, #1a1715 0%, #100e0c 100%)',
                      color: '#8c847b',
                      border: '1px solid #2a2520',
                    }}
                  >
                    Dismiss
                  </button>
                </div>
              </div>
            )}

            <div className="mt-3 text-center text-[9px] text-stone-600"
              style={{ fontFamily: '"DM Mono", monospace', letterSpacing: '0.05em' }}>
              Shortcuts: Left/Right arrows or +/- to adjust click, M for midpoint
            </div>

            <div className="mt-8 mb-1 text-center text-[10px] leading-relaxed text-stone-600"
              style={{ fontFamily: '"DM Mono", monospace', letterSpacing: '0.05em' }}>

            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
